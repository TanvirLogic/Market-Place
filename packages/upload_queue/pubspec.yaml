name: upload_queue
description: A simple, resilient file upload queue that survives app kill.
  Handles both direct S3 PUT and multipart upload automatically.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.11.1

dependencies:
  http: ^1.2.1
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  path: ^1.9.0
  meta: ^1.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  sqflite_common_ffi: ^2.3.0
  mocktail: ^1.0.0
  test: ^1.25.0

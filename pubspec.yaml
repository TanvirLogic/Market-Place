name: edtech
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.5+1
  http: ^1.2.1
  shared_preferences: ^2.2.3
  google_fonts: ^8.1.0
  logger: ^2.7.0
  flutter_svg: ^2.0.10
  google_sign_in: ^6.2.1
  media_kit: ^1.1.10
  media_kit_video: ^1.2.5
  media_kit_native_event_loop: ^1.0.9
  media_kit_libs_android_video: ^1.3.5
  flutter_secure_storage: ^10.1.0
  image_picker: ^1.1.2
  file_picker: ^8.0.0
  url_launcher: ^6.3.1
  cached_network_image: ^3.4.1
  image_cropper: ^8.0.2
  dotted_border: ^2.1.0
  flutter_local_notifications: ^22.0.1
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  rename: ^3.1.0
  video_thumbnail: ^0.5.3
  webview_flutter: ^4.14.0
  flutter_tawk_to_plus: ^1.1.1
  # Industry-standard background upload/download (iOS URLSession + Android WorkManager).
  # Its built-in persistent database is the single source of truth for task
  # status, progress and response headers (S3 ETags) — survives app kill.
  background_downloader: ^9.5.5


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  change_app_package_name: ^1.5.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/app/
    - assets/images/icons/nav/
    - assets/images/icons/hub/
    - assets/images/icons/course/
    - assets/images/course_icons/
    - assets/images/icons/action/
    - assets/images/profile_icons/
    - assets/images/social_icons/
    - assets/images/revenue_icons/


